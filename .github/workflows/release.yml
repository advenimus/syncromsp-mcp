name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm ci
      - run: npm run build
      - run: npm test

  release:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.release-check.outputs.released }}
      version: ${{ steps.release-check.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - name: Get tags before release
        id: before
        run: echo "latest_tag=$(git describe --tags --abbrev=0 2>/dev/null || echo 'none')" >> "$GITHUB_OUTPUT"
      - run: npm ci
      - run: npm run build
      - name: Install semantic-release plugins
        run: npm install --no-save semantic-release @semantic-release/commit-analyzer @semantic-release/release-notes-generator @semantic-release/npm @semantic-release/github
      - name: Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npx semantic-release
      - name: Check if new release was created
        id: release-check
        run: |
          git fetch --tags
          NEW_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo 'none')
          OLD_TAG="${{ steps.before.outputs.latest_tag }}"
          echo "Old tag: $OLD_TAG"
          echo "New tag: $NEW_TAG"
          if [ "$NEW_TAG" != "$OLD_TAG" ] && [ "$NEW_TAG" != "none" ]; then
            VERSION="${NEW_TAG#v}"
            echo "released=true" >> "$GITHUB_OUTPUT"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "New release: $VERSION"
          else
            echo "released=false" >> "$GITHUB_OUTPUT"
            echo "version=" >> "$GITHUB_OUTPUT"
            echo "No new release"
          fi

  mcpb:
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run build
      - name: Prune dev dependencies
        run: npm prune --omit=dev
      - name: Update manifest version
        run: |
          node -e "
            const fs = require('fs');
            const m = JSON.parse(fs.readFileSync('manifest.json', 'utf8'));
            m.version = '${{ needs.release.outputs.version }}';
            fs.writeFileSync('manifest.json', JSON.stringify(m, null, 2) + '\n');
          "
      - name: Install mcpb CLI
        run: npm install -g @anthropic-ai/mcpb
      - name: Validate manifest
        run: mcpb validate manifest.json
      - name: Pack MCPB bundle
        run: mcpb pack . syncromsp-mcp.mcpb
      - name: Upload MCPB to Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "v${{ needs.release.outputs.version }}" syncromsp-mcp.mcpb \
            --repo ${{ github.repository }} --clobber

  skill:
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Sync skill version with release tag
        run: |
          sed -i "s/^version: .*/version: ${{ needs.release.outputs.version }}/" skills/syncromsp/SKILL.md
          grep '^version:' skills/syncromsp/SKILL.md
      - name: Package skill as zip
        run: |
          cd skills
          zip -r "../syncromsp-skill.zip" syncromsp -x "syncromsp/config.json"
          unzip -l ../syncromsp-skill.zip
      - name: Upload skill zip to Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "v${{ needs.release.outputs.version }}" syncromsp-skill.zip \
            --repo ${{ github.repository }} --clobber

  docker:
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:v${{ needs.release.outputs.version }}
