services:
  syncro-mcp:
    build: .
    container_name: syncromsp-mcp
    restart: unless-stopped
    ports:
      - "${MCP_PORT:-8080}:8080"
    environment:
      - SYNCRO_API_KEY=${SYNCRO_API_KEY}
      - SYNCRO_SUBDOMAIN=${SYNCRO_SUBDOMAIN}
      - MCP_TRANSPORT=http
      - MCP_PORT=8080
      - MCP_BASE_URL=${MCP_BASE_URL:-http://localhost:8080}
      # Set MCP_AUTH=false to disable OAuth (not recommended for public deployments)
      - MCP_AUTH=${MCP_AUTH:-true}
